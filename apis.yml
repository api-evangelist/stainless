apis:
  - aid: stainless:stainless
    name: Stainless
    tags:
      - API
      - SDKs
      - Code Generation
    humanURL: https://www.stainlessapi.com/
    properties:
      - url: https://www.stainlessapi.com/
        type: Documentation
      - url: https://www.stainless.com/products/sdks
        type: Documentation
      - url: https://www.stainless.com/docs/
        type: GettingStarted
    description: >-
      Generate best-in-class SDKs. Developers expect your API to come with a
      typesafe client library in their language. With Stainless, you can deliver
      idiomatic SDKs in TypeScript, Python, Go, Java, Kotlin, Ruby, C#, PHP,
      and Terraform, all generated from your OpenAPI spec. The platform handles
      HTTP requests, retries with exponential backoff, streaming, and
      pagination so your users can focus on building. Trusted by Anthropic,
      Cloudflare, Google, and OpenAI.
  - aid: stainless:stainless-docs-platform
    name: Stainless Docs Platform
    tags:
      - Documentation
      - API Reference
      - Developer Experience
    humanURL: https://www.stainless.com/products/docs
    properties:
      - url: https://www.stainless.com/products/docs
        type: Documentation
      - url: https://www.stainless.com/docs/docs-platform/
        type: GettingStarted
    description: >-
      The Stainless Docs Platform combines your API reference, usage examples,
      and narrative guides into a single, cohesive experience that evolves with
      your API. Go from an OpenAPI spec to a live, interactive documentation
      site in minutes with a developer-centric docs-as-code workflow and deep
      control over content, layout, and deployment.
  - aid: stainless:stainless-mcp-servers
    name: Stainless MCP Servers
    tags:
      - MCP
      - AI Agents
      - Code Generation
    humanURL: https://www.stainless.com/products/mcp
    properties:
      - url: https://www.stainless.com/products/mcp
        type: Documentation
      - url: https://www.stainless.com/docs/targets/mcp/
        type: GettingStarted
      - url: https://www.stainless.com/mcp
        type: Portal
    description: >-
      Stainless generates production-ready MCP servers optimized for agentic
      coding and context limits directly from your OpenAPI spec.
      Production-grade capabilities like OAuth, SSE, and remote servers are
      included by default. The generated MCP servers use a code tool
      architecture with a code execution tool and a docs search tool, enabling
      your API to work seamlessly with Claude Desktop, Cursor, and other MCP
      clients.
