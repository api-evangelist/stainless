name: Stainless Vocabulary
description: >-
  Vocabulary and taxonomy for the Stainless API developer experience platform
  covering SDK generation, documentation, MCP servers, CLI generation, and
  Terraform provider generation from OpenAPI specifications.
created: '2026-05-02'
modified: '2026-05-02'
terms:
  - term: SDK Generator
    definition: >-
      The core Stainless product that accepts an OpenAPI specification and produces
      idiomatic, production-ready client libraries in multiple programming languages.
      Handles HTTP, retries, pagination, streaming, and language-specific patterns.
    tags: [Core Product, Code Generation]

  - term: OpenAPI Spec
    definition: >-
      The input artifact for all Stainless generation pipelines. Stainless reads
      OpenAPI 3.x specifications and uses them to generate SDKs, documentation,
      MCP servers, CLIs, and Terraform providers. Specs can be uploaded via GitHub
      Actions or the Stainless Studio.
    tags: [Input, OpenAPI, Configuration]

  - term: SDK
    definition: >-
      A Software Development Kit generated by Stainless. Each SDK is an idiomatic
      client library published to the appropriate package registry (npm, PyPI, Maven,
      crates.io, etc.) that exposes every API operation as a typed method call.
    tags: [Output, Client Library]

  - term: Stainless Studio
    definition: >-
      The web-based interface for uploading OpenAPI specs, previewing generated SDKs,
      and configuring generation settings. Accessible at app.stainless.com.
    tags: [Platform, UI]

  - term: Idiomatic SDK
    definition: >-
      An SDK that follows the conventions, naming patterns, and package structure
      expected by developers in a particular language ecosystem. Stainless generates
      idiomatic SDKs rather than generic HTTP wrappers.
    tags: [SDK, Quality]

  - term: Retry Logic
    definition: >-
      Automatic retry behavior included in all Stainless-generated SDKs. Uses
      exponential backoff with jitter for transient failures (429, 503, network errors).
      Configurable at the SDK level.
    tags: [Reliability, SDK Feature]

  - term: Pagination
    definition: >-
      Automatic page iteration included in Stainless-generated SDKs for endpoints
      that return paginated collections. Supports cursor-based, offset-based, and
      page-number pagination patterns detected from the OpenAPI spec.
    tags: [SDK Feature, Developer Experience]

  - term: Streaming
    definition: >-
      Support for server-sent events (SSE) and streaming responses in Stainless-
      generated SDKs, enabling real-time data consumption from streaming API endpoints.
      Automatically detected from the OpenAPI spec.
    tags: [SDK Feature, Real-Time]

  - term: Docs Platform
    definition: >-
      A Stainless product that generates interactive documentation websites from an
      OpenAPI spec. Combines API reference, usage examples, and narrative guides.
      Built on Astro and deployable to Cloudflare or custom infrastructure.
    tags: [Documentation, Product]

  - term: MCP Server
    definition: >-
      A Model Context Protocol server generated by Stainless from an OpenAPI spec.
      Exposes API operations as MCP tools consumable by AI agents including Claude
      Desktop and Cursor. Uses a code tool architecture optimized for context efficiency.
    tags: [MCP, AI Agents, Product]

  - term: CLI
    definition: >-
      A command-line interface generated by Stainless from an OpenAPI spec. Provides
      developers with a typed terminal interface for interacting with an API without
      writing code.
    tags: [CLI, Developer Tools, Product]

  - term: Terraform Provider
    definition: >-
      A HashiCorp Terraform provider generated by Stainless from an OpenAPI spec.
      Enables infrastructure-as-code management of API resources using standard
      Terraform HCL syntax.
    tags: [Terraform, Infrastructure as Code, Product]

  - term: GitHub Action
    definition: >-
      Stainless-provided GitHub Actions (upload-openapi-spec-action, build-sdk-action)
      that automate SDK regeneration whenever an OpenAPI spec changes in a repository.
      Enables continuous SDK delivery alongside API development.
    tags: [CI/CD, Automation, Integration]

  - term: Stainless Config
    definition: >-
      A YAML configuration file (.stainless.yml) that controls SDK generation behavior,
      including resource groupings, method naming, pagination configuration, and
      language-specific options.
    tags: [Configuration, SDK]

  - term: Target Language
    definition: >-
      A programming language for which Stainless can generate an SDK. Current targets
      include TypeScript, Python, Go, Java, Kotlin, Ruby, C#, PHP, and Terraform.
      Rust and Swift are in development.
    tags: [SDK, Language Support]
